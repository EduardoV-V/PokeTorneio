<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Top half red -->
  <path d="M10,50 A40,40 0 0,1 90,50 Z" fill="#e3350d"/>
  <!-- Bottom half white -->
  <path d="M10,50 A40,40 0 0,0 90,50 Z" fill="#ffffff"/>
  <!-- Outer ring -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#1a1a2e" stroke-width="5"/>
  <!-- Middle band -->
  <line x1="10" y1="50" x2="90" y2="50" stroke="#1a1a2e" stroke-width="5"/>
  <!-- Center button outer -->
  <circle cx="50" cy="50" r="13" fill="#1a1a2e"/>
  <!-- Center button inner -->
  <circle cx="50" cy="50" r="9" fill="#ffffff"/>
  <!-- Center button shine -->
  <circle cx="47" cy="47" r="3" fill="rgba(255,255,255,0.6)"/>
</svg>
